<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growvoria Feed Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
a{color:inherit;text-decoration:none}
header{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:18px 32px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 16px rgba(79,70,229,.35)}
.logo{width:42px;height:42px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
header h1{font-size:1.35rem;font-weight:700}
header p{font-size:.8rem;opacity:.8;margin-top:2px}
.container{max-width:1080px;margin:0 auto;padding:28px 16px}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:26px;margin-bottom:22px}
.card-title{font-size:.95rem;font-weight:700;color:#374151;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.form-row{display:flex;gap:10px;flex-wrap:wrap}
input[type=text],select{flex:1;min-width:200px;padding:11px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:.93rem;outline:none;transition:.2s;color:#1f2937}
input[type=text]:focus,select:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.btn{padding:11px 26px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:10px;font-size:.93rem;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.35)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-sm{padding:7px 16px;font-size:.8rem;border-radius:8px}
.btn-ghost{background:#fff;color:#6366f1;border:2px solid #e5e7eb}
.btn-ghost:hover{border-color:#c4b5fd;background:#f5f3ff;box-shadow:none}
.hint{font-size:.78rem;color:#9ca3af;margin-top:10px}

/* Progress */
#prog-wrap{display:none;margin-top:18px;padding:16px;background:#f5f3ff;border-radius:10px;border:1px solid #ede9fe}
.prog-bar-bg{background:#ede9fe;border-radius:99px;height:6px;margin:10px 0}
.prog-bar{background:linear-gradient(90deg,#6366f1,#8b5cf6);height:6px;border-radius:99px;width:0;transition:width .5s ease}
.prog-text{font-size:.85rem;color:#5b21b6;display:flex;align-items:center;gap:6px}
.spin{width:14px;height:14px;border:2px solid #c4b5fd;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Alert */
.alert{padding:12px 16px;border-radius:10px;font-size:.87rem;margin-top:14px;border:1px solid}
.err{background:#fef2f2;color:#b91c1c;border-color:#fca5a5}
.ok{background:#f0fdf4;color:#15803d;border-color:#86efac}

/* Results */
#results{display:none;margin-top:0}
.res-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.res-title{font-size:1.05rem;font-weight:700;color:#1f2937}
.res-meta{font-size:.82rem;color:#6b7280;margin-top:3px}
.stat-pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:99px;font-size:.78rem;font-weight:600}
.pill-green{background:#d1fae5;color:#065f46}
.pill-blue{background:#dbeafe;color:#1e40af}
.pill-purple{background:#ede9fe;color:#5b21b6}
.feeds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.feed-card{border:1.5px solid #e5e7eb;border-radius:12px;padding:14px;transition:.2s}
.feed-card:hover{border-color:#c4b5fd;box-shadow:0 2px 8px rgba(99,102,241,.12)}
.fc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fc-left{display:flex;align-items:center;gap:8px}
.fc-flag{font-size:1.4rem;line-height:1}
.fc-name{font-weight:600;font-size:.88rem;color:#1f2937}
.fc-curr{font-size:.72rem;color:#9ca3af;background:#f3f4f6;padding:2px 7px;border-radius:99px;font-weight:600}
.fc-url{font-size:.72rem;color:#6b7280;background:#f9fafb;padding:7px 10px;border-radius:7px;word-break:break-all;cursor:pointer;margin-bottom:7px;border:1px solid #f3f4f6;transition:.15s}
.fc-url:hover{background:#f0f0ff;border-color:#e0d9ff}
.copy-btn{width:100%;padding:5px 0;font-size:.77rem;border-radius:7px;background:#f3f4f6;border:1px solid #e5e7eb;cursor:pointer;color:#4b5563;font-weight:600;transition:.15s}
.copy-btn:hover{background:#ede9fe;border-color:#c4b5fd;color:#5b21b6}
.copy-btn.done{background:#d1fae5;border-color:#6ee7b7;color:#065f46}

/* Store list */
.store-item{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid #f3f4f6}
.store-item:last-child{border:none}
.s-domain{font-weight:600;font-size:.9rem;color:#1f2937}
.s-meta{font-size:.77rem;color:#9ca3af;margin-top:2px}
.s-tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.72rem;font-weight:600;background:#ede9fe;color:#5b21b6;margin-right:4px}
.empty{color:#9ca3af;font-size:.88rem;text-align:center;padding:20px 0}

@media(max-width:580px){
  header{padding:14px 16px}
  .feeds-grid{grid-template-columns:1fr}
  .form-row{flex-direction:column}
}
</style>
</head>
<body>

<header>
  <div class="logo">🌿</div>
  <div>
    <h1>Growvoria Feed Generator</h1>
    <p>Google Shopping &amp; Pinterest XML feeds — any Shopify store, no app required</p>
  </div>
</header>

<div class="container">

  <!-- Generator -->
  <div class="card">
    <div class="card-title">⚡ Generate Feeds for Any Store</div>
    <div class="form-row">
      <input type="text" id="domain" placeholder="elrabags.myshopify.com" autocomplete="off" spellcheck="false">
      <select id="currency">
        <option value="USD">USD — US Dollar</option>
        <option value="GBP">GBP — British Pound</option>
        <option value="EUR">EUR — Euro</option>
        <option value="AED">AED — UAE Dirham</option>
        <option value="SAR">SAR — Saudi Riyal</option>
        <option value="PKR">PKR — Pakistani Rupee</option>
        <option value="INR">INR — Indian Rupee</option>
        <option value="CAD">CAD — Canadian Dollar</option>
        <option value="AUD">AUD — Australian Dollar</option>
        <option value="JPY">JPY — Japanese Yen</option>
        <option value="SGD">SGD — Singapore Dollar</option>
        <option value="KWD">KWD — Kuwaiti Dinar</option>
      </select>
      <button class="btn" id="gen-btn" onclick="generate()">⚡ Generate</button>
    </div>
    <p class="hint">ℹ️ Works for any live public Shopify store. No token or app installation needed.</p>

    <div id="prog-wrap">
      <div class="prog-bar-bg"><div class="prog-bar" id="prog"></div></div>
      <p class="prog-text"><span class="spin"></span><span id="prog-text">Starting...</span></p>
    </div>
    <div id="err-box" class="alert err" style="display:none"></div>
  </div>

  <!-- Results -->
  <div class="card" id="results">
    <div class="res-header">
      <div>
        <div class="res-title">✅ <span id="r-name"></span></div>
        <div class="res-meta" id="r-meta"></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="copyAll()">📋 Copy All URLs</button>
        <button class="btn btn-sm" onclick="generate()">🔄 Re-generate</button>
      </div>
    </div>
    <div class="feeds-grid" id="feeds-grid"></div>
  </div>

  <!-- All Stores -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="card-title" style="margin:0">📦 All Generated Stores</div>
      <button class="btn btn-ghost btn-sm" onclick="loadStores()">🔄 Refresh</button>
    </div>
    <div id="stores-list"><p class="empty">Loading...</p></div>
  </div>

</div>

<script>
const FLAGS={us:'🇺🇸',ae:'🇦🇪',uk:'🇬🇧',sa:'🇸🇦',jp:'🇯🇵',kr:'🇰🇷',au:'🇦🇺',sg:'🇸🇬',hk:'🇭🇰',qa:'🇶🇦',kw:'🇰🇼',bh:'🇧🇭',ca:'🇨🇦',nl:'🇳🇱',br:'🇧🇷',my:'🇲🇾',th:'🇹🇭',no:'🇳🇴',se:'🇸🇪',ch:'🇨🇭',fr:'🇫🇷',it:'🇮🇹',de:'🇩🇪'};
const NAMES={us:'United States',ae:'UAE',uk:'United Kingdom',sa:'Saudi Arabia',jp:'Japan',kr:'South Korea',au:'Australia',sg:'Singapore',hk:'Hong Kong',qa:'Qatar',kw:'Kuwait',bh:'Bahrain',ca:'Canada',nl:'Netherlands',br:'Brazil',my:'Malaysia',th:'Thailand',no:'Norway',se:'Sweden',ch:'Switzerland',fr:'France',it:'Italy',de:'Germany'};
const CURR={us:'USD',ae:'AED',uk:'GBP',sa:'SAR',jp:'JPY',kr:'KRW',au:'AUD',sg:'SGD',hk:'HKD',qa:'QAR',kw:'KWD',bh:'BHD',ca:'CAD',nl:'EUR',br:'BRL',my:'MYR',th:'THB',no:'NOK',se:'SEK',ch:'CHF',fr:'EUR',it:'EUR',de:'EUR'};

let lastData = null;

function prog(pct,txt){document.getElementById('prog').style.width=pct+'%';document.getElementById('prog-text').textContent=txt;}

async function generate(){
  const domain=document.getElementById('domain').value.trim();
  const currency=document.getElementById('currency').value;
  if(!domain){alert('Please enter a store domain');return;}
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('results').style.display='none';
  document.getElementById('err-box').style.display='none';
  prog(8,'Connecting to store...');
  try{
    prog(15,'Fetching products from Shopify...');
    const r=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({shop_domain:domain,shop_currency:currency})
    });
    prog(80,'Building XML feeds...');
    if(!r.ok){const e=await r.json();throw new Error(e.detail||'Generation failed');}
    const data=await r.json();
    prog(100,'Done!');
    lastData=data;
    setTimeout(()=>{
      document.getElementById('prog-wrap').style.display='none';
      showResults(data);
      loadStores();
    },400);
  }catch(e){
    document.getElementById('prog-wrap').style.display='none';
    const eb=document.getElementById('err-box');
    eb.textContent='❌ '+e.message;
    eb.style.display='block';
  }finally{
    document.getElementById('gen-btn').disabled=false;
  }
}

function showResults(d){
  document.getElementById('r-name').textContent=d.shop_name||d.shop_domain;
  document.getElementById('r-meta').textContent=
    d.products+' products · '+d.items+' feed items · 23 regional feeds generated';
  const grid=document.getElementById('feeds-grid');
  grid.innerHTML='';
  Object.keys(FLAGS).forEach(region=>{
    const url=d.feed_urls[region];
    const div=document.createElement('div');
    div.className='feed-card';
    div.innerHTML=`
      <div class="fc-top">
        <div class="fc-left"><span class="fc-flag">${FLAGS[region]}</span><span class="fc-name">${NAMES[region]}</span></div>
        <span class="fc-curr">${CURR[region]}</span>
      </div>
      <div class="fc-url" onclick="copyUrl('${url}',null)">${url}</div>
      <button class="copy-btn" onclick="copyUrl('${url}',this)">Copy URL</button>
    `;
    grid.appendChild(div);
  });
  document.getElementById('results').style.display='block';
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function copyUrl(url,btn){
  navigator.clipboard.writeText(url).then(()=>{
    if(!btn)return;
    btn.textContent='✓ Copied!';btn.classList.add('done');
    setTimeout(()=>{btn.textContent='Copy URL';btn.classList.remove('done');},1800);
  });
}

function copyAll(){
  if(!lastData)return;
  const lines=Object.keys(FLAGS).map(r=>NAMES[r]+': '+lastData.feed_urls[r]).join('\n');
  navigator.clipboard.writeText(lines).then(()=>alert('All 23 feed URLs copied to clipboard!'));
}

async function loadStores(){
  const el=document.getElementById('stores-list');
  try{
    const r=await fetch('/api/stores');
    const d=await r.json();
    const stores=d.stores||[];
    if(!stores.length){el.innerHTML='<p class="empty">No feeds generated yet. Use the form above to get started!</p>';return;}
    el.innerHTML=stores.map(s=>`
      <div class="store-item">
        <div>
          <div class="s-domain">🏪 ${s.slug}</div>
          <div class="s-meta">${s.feed_count} feeds &nbsp;·&nbsp; Updated: ${s.updated}</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="loadStore('${s.slug}')">View URLs</button>
          <button class="btn btn-sm" onclick="regenStore('${s.slug}')">🔄</button>
        </div>
      </div>
    `).join('');
  }catch(e){el.innerHTML='<p class="empty" style="color:#ef4444">Could not load stores.</p>';}
}

async function loadStore(slug){
  const r=await fetch('/api/store/'+slug);
  if(!r.ok){alert('Store not found');return;}
  const d=await r.json();
  document.getElementById('domain').value=slug+'.myshopify.com';
  showResults(d);
}

function regenStore(slug){
  document.getElementById('domain').value=slug+'.myshopify.com';
  generate();
}

document.getElementById('domain').addEventListener('keydown',e=>{if(e.key==='Enter')generate();});
loadStores();
</script>
</body>
</html>
